<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0845" />
      <stop offset="100%" stop-color="#6441A5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="15" ry="15"/>
  <circle cx="100" cy="100" r="50" fill="#ffeb3b" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="50;55;50" dur="2s" repeatCount="indefinite" />
  </circle>
  <path d="M85 100 L100 115 L125 85" stroke="#2a0845" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="200" y="115" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow)">Awesome Payments</text>
  <text x="205" y="150" font-family="Arial, sans-serif" font-size="20" fill="#e0e0e0">The Best APIs &amp; Open-Source Alternatives</text>
  <circle cx="700" cy="100" r="30" fill="#00e676" opacity="0.8" filter="url(#glow)">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite" />
  </circle>
  <text x="688" y="110" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">$</text>
</svg>
